@page "/"
@using rsvpreader.Services
@using System.Timers
@inject ArticleService ArticleService
@inject IJSRuntime JS
@implements IDisposable
@rendermode InteractiveServer

<PageTitle>@pageTitle</PageTitle>

<div class="container text-center mt-5">
    <h1 class="mb-4">@articleTitle</h1>

    <div class="input-group mb-3">
        <input @bind="url" class="form-control" placeholder="Paste article URL senpai :3" />
        <button class="btn btn-success" @onclick="LoadArticle">Load</button>
    </div>

    @if (isLoading)
    {
        <div class="spinner-border text-primary" role="status"></div>
        <p>Fetching content...</p>
    }
    else if (words.Length > 0 && currentIndex < words.Length)
    {
        <div class="reader-box p-5 mb-3 bg-dark text-light rounded shadow-lg">
            <center>
            <h1 style="font-family: 'JetBrains Mono', monospace; font-size: 4rem;">
                @words[currentIndex]
            </h1>
            </center>
        </div>

        <div class="controls d-flex align-items-center justify-content-center gap-3">
            <button class="btn btn-lg btn-primary" @onclick="ToggleTimer">
                <i class="fas @(isPlaying ? "fa-pause" : "fa-play")"></i> @(isPlaying ? "Pause" : "Play")
            </button>

            <div class="w-25">
                <input type="range" class="form-range" min="100" max="1000" step="50" @bind="wpm" />
                <label>@wpm WPM</label>
            </div>

            <button class="btn btn-outline-secondary" @onclick="() => currentIndex = 0">Reset</button>
        </div>
        <p class="mt-3 text-muted">Word @(currentIndex + 1) of @words.Length</p>

        @* Show Full Article & Article *@

        <div class="mt-4">
            <button class="btn btn-outline-secondary" @onclick="() => showFullArticle = !showFullArticle">
                <i class="fas @(showFullArticle ? "fa-eye-slash" : "fa-eye")"></i> 
                @(showFullArticle ? "Hide" : "Show") Full Article
            </button>

        @if (showFullArticle)
        {
            <div class="mt-3 p-4 border rounded text-start bg-light shadow-sm" style="max-height: 400px; overflow-y: auto;">
            <h5 class="text-muted">@baseTitle</h5>
            <hr />
            <div style="line-height: 2.2; font-size: 1.1rem; color: #333;">
                @for (int i = 0; i < words.Length; i++)
                {
                    int wordIndex = i; 
                    <span @key="wordIndex"
                        @onclick="() => JumpToWord(wordIndex)"
                        id="@(wordIndex == currentIndex ? "active-word" : "")"
                        class="@(wordIndex == currentIndex ? "bg-warning text-dark fw-bold" : "text-dark")" 
                        style="padding: 2px 4px; border-radius: 4px; cursor: pointer; @(wordIndex == currentIndex ? "background-color: #ffc107 !important;" : "")">
                        @words[wordIndex]
                    </span>
                    @(" ") 
                }
            </div>
        </div>
        }
    </div>
    }
</div>

@code {
    private string baseTitle = "";
    private bool showFullArticle = false;

    private string articleTitle = "RSVP Reader Plus";
    private string fullText = "";
    private string pageTitle = "RSVP Reader Plus";

    private string url = "";
    private string[] words = Array.Empty<string>();
    private int currentIndex = 0;
    private int wpm = 300;
    private bool isPlaying = false;
    private bool isLoading = false;
    private Timer? timer;

    async Task LoadArticle()
    {
        if (string.IsNullOrWhiteSpace(url)) return;

        Stop();
        isLoading = true;
        StateHasChanged();

        try
        {
            var result = await ArticleService.GetArticleAsync(url);
            words = result.Words;

            baseTitle = result.Title;
            articleTitle = "RSVP Reader Plus | " + result.Title;
            pageTitle = result.Title + "| RSVP Reader";
            fullText = string.Join(" ", words);

            currentIndex = 0;
        }
        catch (Exception ex) // Fixed: added (Exception ex)
        {
            Console.WriteLine($"Error: {ex.Message}");
            words = new[] { "Error", "loading", "article" };
        }
        finally
        {
            isLoading = false;
            StateHasChanged();
        }
    }

    void ToggleTimer()
    {
        if (isPlaying) Stop(); else Start();
    }

    void Start()
        {
            if (words.Length == 0) return;
            isPlaying = true;

            timer = new Timer(60000 / wpm);

            timer.Elapsed += async (s, e) => {
                if (currentIndex < words.Length - 1) {
                    currentIndex++;
                    
                    await JS.InvokeVoidAsync("speakWord", words[currentIndex], wpm);
                    
                    await InvokeAsync(StateHasChanged);
                } else {
                    Stop();
                }
            };

            timer.AutoReset = true;
            timer.Enabled = true;
        }

    async Task Stop()
    {
        isPlaying = false;
        timer?.Stop();
        timer?.Dispose();
        timer = null;

        await InvokeAsync(StateHasChanged);
    }

    private void JumpToWord(int index)
    {
        currentIndex = index;
        StateHasChanged();
    }
    
    public void Dispose() => timer?.Dispose();
}